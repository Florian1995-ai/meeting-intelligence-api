services:
  meeting-intelligence:
    build: .
    ports:
      - "8100:8000"
    environment:
      - NEO4J_URI=bolt://168.231.64.2:7688
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
    volumes:
      - transcript_data:/data/transcripts
    restart: unless-stopped

volumes:
  transcript_data:
